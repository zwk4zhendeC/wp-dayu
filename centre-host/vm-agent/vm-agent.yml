global:
  scrape_interval: 10s
  scrape_timeout: 10s

scrape_configs:

  - job_name: wp-editor-alpha-connected-icmp
    metrics_path: /probe
    params:
      module: [icmp_ipv4]
    static_configs:
      - targets:
          - editor.alpha.warpparse.ai
        labels:
          app_name: wp-editor-alpha
          asset_type: service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service_type
        replacement: icmp
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: wp-editor-alpha-connected-http
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://editor.alpha.warpparse.ai
        labels:
          app_name: wp-editor-alpha
          asset_type: service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service_type
        replacement: http
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: vaultwarden-connected-icmp
    metrics_path: /probe
    params:
      module: [icmp_ipv4]
    static_configs:
      - targets:
          - password.corp.dy-sec.com
        labels:
          app_name: vaultwarden
          asset_type: service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service_type
        replacement: icmp
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: vaultwarden-connected-http
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://password.corp.dy-sec.com
        labels:
          app_name: vaultwarden
          asset_type: service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service_type
        replacement: http
      - target_label: __address__
        replacement: blackbox-exporter:9115

