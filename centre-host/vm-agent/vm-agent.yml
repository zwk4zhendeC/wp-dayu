global:
  scrape_interval: 10s
  scrape_timeout: 10s

scrape_configs:

  - job_name: host-icmp
    metrics_path: /probe
    params:
      module: [icmp_ipv4]
    static_configs:
      - targets:
          - 43.135.36.218
          - 159.75.114.104
        labels:
          asset_type: host
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service_type
        replacement: icmp
      - source_labels: [__address__]
        target_label: host_ip
      - target_label: __address__
        replacement: blackbox-exporter:9115

