[[connectors]]
id = "victorialogs_sink"
type = "victorialogs"
allow_override = ["endpoint", "insert_path", "flush_interval_secs", "create_time_field","batch_size"]
[connectors.params]
endpoint = "http://victoria-logs:9428"
insert_path = "/insert/jsonline"
flush_interval_secs = 3

[[sink_group.sinks]]
name = "victorialogs_output"
connect = "victorialogs_sink"
params = { endpoint = "http://victoria-logs:9428", insert_path = "/insert/jsonline", tags = ["wp_stage:miss"] }
