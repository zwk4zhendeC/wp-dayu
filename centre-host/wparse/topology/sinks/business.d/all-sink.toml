version = "2.0"

[sink_group]
name = "all"
rule = ["*"]

# file
[[sink_group.sinks]]
connect = "file_json_sink"
name = "file_sink"
params = { file = "all.dat" }
tags = ["sink_category:business"]

[sink_group.sinks.expect]
ratio = 0.50
tol   = 0.02


# vlog
[[sink_group.sinks]]
name = "victorialogs_output"
connect = "victorialogs_sink"
params = { endpoint = "http://victoria-logs:9428", insert_path = "/insert/jsonline?_msg_field=content", flush_interval_secs = 3}