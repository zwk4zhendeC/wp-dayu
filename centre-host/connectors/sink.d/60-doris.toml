[[connectors]]
id = "doris_sink"
type = "doris"
# 允许通过 sink 的 params 覆盖 Doris 连接和 Stream Load 关键参数
allow_override = [
  "endpoint",
  "user",
  "password",
  "database",
  "table",
  "timeout_secs",
  "max_retries",
  "headers",
  "batch_size"
]

[connectors.params]
endpoint = "http://localhost:8040"  # 使用 BE 的 HTTP 端口（推荐）
user = "root"                       # 用户名
password = ""                       # 密码
database = ""                       # 数据库
table = ""                          # 表名
timeout_secs = 30                   # 请求超时时间
max_retries = 3                     # 请求重试次数
batch_size = 1_0000                 # 请求批量大小

# 可选：自定义 Stream Load 参数
[connectors.params.headers]
strip_outer_array = "false"
max_filter_ratio = "0.1"
strict_mode = "false"