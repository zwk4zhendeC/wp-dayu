global:
  scrape_interval: '%{METRICS_FLUSH_INTERVAL}'
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'wp-editor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          app_name: wp-editor
          asset_type: service
          host_ip: "%{HOST_IP}"
    metric_relabel_configs:
      - source_labels: [id]
        # 多个之间使用| 分割
        regex: '(/system.slice/wp-editor.service)'
        action: keep
  - job_name: 'host'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          asset_type: host
          host_ip: "%{HOST_IP}"