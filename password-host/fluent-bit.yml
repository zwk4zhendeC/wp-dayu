service:
  flush: 1
  daemon: off
  log_level: info
  http_server: on
  http_listen: 0.0.0.0
  http_port: 2020

pipeline:
  inputs:
    # 密码服务日志
    - name: tail
      path: /host/var/lib/docker/containers/*/*.log
      path_key: filename
      refresh_interval: 5
      skip_long_lines: on
      tag: docker.app.password
    - name: tail
      path: /host/var/log/nginx/*
      tag: host.app.nginx

  filters:
    # 添加容器名信息
    - name: lua
      match: 'docker.app.*'
      script: ./script/docker-utils.lua
      call: extract_container_name
    # 只保留容器名=vaultwarden
    - name: grep
      match: 'docker.app.password'
      regex: container_name vaultwarden
    # 添加相关业务字段
    - name: modify
      match: docker.app.password
      add:
        - app_name vaultwarden
    # 添加相关业务字段
    - name: modify
      match: host.app.nginx
      add:
        - app_name nginx
    # 添加相关业务字段
    - name: modify
      match: '*'
      add: 
        - host_name password

  outputs:
    # - name: stdout
    #   match: "*"
    - name: tcp
      match: "*"
      host: 193.112.112.194
      port: 19003
      format: json_lines