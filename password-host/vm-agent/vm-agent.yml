global:
  scrape_interval: '%{METRICS_FLUSH_INTERVAL}'
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'vaultwarden'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          app_name: vaultwarden
          asset_type: service
          host_ip: "%{HOST_IP}"
    metric_relabel_configs:
      - source_labels: [name]
        # 多个之间使用| 分割
        regex: '(vaultwarden)'
        action: keep
      - source_labels: [name]
        target_label: container_name
        action: replace
        regex: (.*)
  - job_name: 'host'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          asset_type: host
          host_ip: "%{HOST_IP}"
  # 可用性
  - job_name: service-http
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://password.corp.dy-sec.com
        labels:
          app_name: vaultwarden
          asset_type: service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: service_type
        replacement: http
      - target_label: __address__
        replacement: blackbox-exporter:9115
