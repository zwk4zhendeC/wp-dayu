global:
  scrape_interval: 1s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'vaultwarden'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          app_name: vaultwarden
          asset_type: vaultwarden
          host_ip: "%{HOST_IP}"
    metric_relabel_configs:
      - source_labels: [name]
        # 多个之间使用| 分割
        regex: '(vaultwarden)'
        action: keep
      - source_labels: [name]
        target_label: container_name
        action: replace
        regex: (.*)