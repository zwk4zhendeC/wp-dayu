version: '3.8'

services:
  fluent-bit:
    image: fluent/fluent-bit:4.0.3   # 选择你需要的版本
    container_name: fluent-bit
    working_dir: /fluent-bit/etc
    restart: always
    env_file:
      - ./.env
    environment:
      - FLB_LOG_LEVEL=info
    volumes:
      # 挂载配置文件
      - ./fluent-bit:/fluent-bit/etc/
      # 宿主机日志目录
      - /var/log:/var/log:ro
      # Docker 容器日志目录
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # 系统时区（可选）
      - /etc/localtime:/etc/localtime:ro
        # 系统时区（可选）
      - /etc/machine-id:/etc/machine-id:ro
      - /:/host:ro
    ports:
      - "2020:2020"   # Fluent Bit 管理端口
      - "24224:24224" # Fluentd 兼容输入 (forward)
      - "24224:24224/udp"
    command: >
      /fluent-bit/bin/fluent-bit
      -c /fluent-bit/etc/fluent-bit.yml
  
  cadvisor:
    image: ghcr.io/google/cadvisor:0.55.1
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      # docker 通信入口
      - /var/run/docker.sock:/var/run/docker.sock:ro   
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  vm-agent:
    image: victoriametrics/vmagent:v1.139.0
    container_name: vm-agent
    ports:
      - "8429:8429"
    env_file:
      - ./.env
    volumes:
      - ./vm-agent/vm-agent.yml:/etc/vm/vm-agent.yml
    command:
      - '--promscrape.config=/etc/vm/vm-agent.yml'
      - '--remoteWrite.url=http://${CENTRE_HOST_IP}:8428/api/v1/write'
      - '--remoteWrite.flushInterval=${METRICS_FLUSH_INTERVAL}'
      - '--remoteWrite.label=version=v2'
    restart: unless-stopped

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'

